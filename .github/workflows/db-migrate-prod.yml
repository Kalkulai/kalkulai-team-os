name: DB Migrate Production

on:
  workflow_dispatch:
    inputs:
      migration:
        description: 'Optional: specific migration number (e.g. 037). Leave empty to push all pending.'
        required: false
        type: string

jobs:
  migrate:
    name: Apply Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check pending migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify schema (smoke check)
        run: |
          supabase db execute --sql "SELECT column_name FROM information_schema.columns WHERE table_name='sales_companies' AND column_name IN ('stage','cold_streak','ai_summary') ORDER BY column_name;" 2>&1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true
